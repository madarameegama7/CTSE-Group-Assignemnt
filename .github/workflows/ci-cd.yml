name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # FRONTEND
      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${IMAGE_TAG} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${IMAGE_TAG}

      # API GATEWAY
      - name: Build API Gateway
        run: |
          cd services/api-gateway/api-gateway
          chmod +x gradlew
          ./gradlew build
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:${IMAGE_TAG} .
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:${IMAGE_TAG}

      # AUTH
      - name: Build Auth
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:${IMAGE_TAG} ./services/auth-service/auth-service
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:${IMAGE_TAG}

      # APPOINTMENT
      - name: Build Appointment
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/appointment:${IMAGE_TAG} ./services/appoinment
          docker push ${{ secrets.DOCKER_USERNAME }}/appointment:${IMAGE_TAG}

      # DOCTOR
      - name: Build Doctor
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/doctor-service:${IMAGE_TAG} ./services/doctor-service/doctor-service
          docker push ${{ secrets.DOCKER_USERNAME }}/doctor-service:${IMAGE_TAG}

      # PAYMENT
      - name: Build Payment
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/payment-service:${IMAGE_TAG} ./services/payment-service
          docker push ${{ secrets.DOCKER_USERNAME }}/payment-service:${IMAGE_TAG}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v3

      - name: Copy compose file
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/doctor-app/"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/doctor-app
            export IMAGE_TAG=${{ github.sha }}

            docker-compose down
            docker-compose pull
            docker-compose up -d

            docker system prune -af