name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ================= FRONTEND =================
      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}

      # ================= API GATEWAY =================
      - name: Build API Gateway
        run: |
          cd services/api-gateway/api-gateway
          chmod +x gradlew
          ./gradlew build
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.sha }}

      # ================= AUTH =================
      - name: Build Auth Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ github.sha }} ./services/auth-service/auth-service
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ github.sha }}

      # ================= APPOINTMENT =================
      - name: Build Appointment Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/appointment:${{ github.sha }} ./services/appoinment
          docker push ${{ secrets.DOCKER_USERNAME }}/appointment:${{ github.sha }}

      # ================= DOCTOR =================
      - name: Build Doctor Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/doctor-service:${{ github.sha }} ./services/doctor-service/doctor-service
          docker push ${{ secrets.DOCKER_USERNAME }}/doctor-service:${{ github.sha }}

      # ================= PAYMENT =================
      - name: Build Payment Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/payment-service:${{ github.sha }} ./services/payment-service
          docker push ${{ secrets.DOCKER_USERNAME }}/payment-service:${{ github.sha }}

  # ============================================================
  # 🚀 DEPLOY TO EC2 (FULLY AUTOMATED)
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/doctor-app/"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/doctor-app

            IMAGE_TAG=${{ github.sha }}

            echo "Deploying version: $IMAGE_TAG"

            docker compose down --remove-orphans

            IMAGE_TAG=$IMAGE_TAG docker compose pull
            IMAGE_TAG=$IMAGE_TAG docker compose up -d --force-recreate

            docker system prune -af