version: "3.8"

services:
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: DockerPass@1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks: [ctse_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-appointment:
    image: postgres:15-alpine
    container_name: postgres-appointment
    environment:
      POSTGRES_DB: appointmentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: DockerPass@1234
    ports:
      - "5433:5432"
    volumes:
      - postgres-appointment-data:/var/lib/postgresql/data
    networks: [ctse_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-doctor:
    image: postgres:15-alpine
    container_name: postgres-doctor
    environment:
      POSTGRES_DB: doctordb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: DockerPass@1234
    ports:
      - "5434:5432"
    volumes:
      - postgres-doctor-data:/var/lib/postgresql/data
    networks: [ctse_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:15-alpine
    container_name: postgres-payment
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: DockerPass@1234
    ports:
      - "5435:5432"
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    networks: [ctse_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: damithrimeegama/frontend:${IMAGE_TAG}
    ports:
      - "3000:80"
    restart: unless-stopped
    networks: [ctse_net]

  api-gateway:
    image: damithrimeegama/api-gateway:${IMAGE_TAG}
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - auth-service
      - appoinment
      - doctor-service
      - payment-service
    networks: [ctse_net]

  auth-service:
    image: damithrimeegama/auth-service:${IMAGE_TAG}
    ports:
      - "8082:8080"
    restart: unless-stopped
    depends_on:
      postgres-auth:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/authdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: DockerPass@1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks: [ctse_net]

  appoinment:
    image: damithrimeegama/appointment:${IMAGE_TAG}
    ports:
      - "8081:8080"
    restart: unless-stopped
    depends_on:
      postgres-appointment:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-appointment:5432/appointmentdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: DockerPass@1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks: [ctse_net]

  doctor-service:
    image: damithrimeegama/doctor-service:${IMAGE_TAG}
    ports:
      - "8083:8080"
    restart: unless-stopped
    depends_on:
      postgres-doctor:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-doctor:5432/doctordb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: DockerPass@1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks: [ctse_net]

  payment-service:
    image: damithrimeegama/payment-service:${IMAGE_TAG}
    ports:
      - "8084:8080"
    restart: unless-stopped
    depends_on:
      postgres-payment:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payment:5432/paymentdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: DockerPass@1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks: [ctse_net]

networks:
  ctse_net:
    driver: bridge

volumes:
  postgres-auth-data:
  postgres-appointment-data:
  postgres-doctor-data:
  postgres-payment-data: